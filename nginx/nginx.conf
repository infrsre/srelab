server {
    listen       80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # Docusaurus SPA routing — unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed JS/CSS bundles — immutable, cache 1 year
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
    }

    # Fonts and images — cache 30 days
    location ~* \.(woff2?|ttf|eot|png|jpg|jpeg|gif|webp|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # HTML and sitemaps — always revalidate
    location ~* \.(html|xml)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Security headers
    add_header X-Frame-Options         "SAMEORIGIN"                     always;
    add_header X-Content-Type-Options  "nosniff"                        always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection        "1; mode=block"                  always;

    # Compression
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
