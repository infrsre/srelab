name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required for GitHub Pages OIDC deployment
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel in-progress deploys
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPO: kiro-sre-guide

jobs:
  # ── Build (verify every push + PR) ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build (AWS target)
        run: npm run build
        env:
          DOCUSAURUS_BASE_URL: /

      # Upload artifact only on main — consumed by deploy-aws and docker-push
      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: build-aws
          path: build/
          retention-days: 1

  # ── GitHub Pages: build with correct base_url, then deploy ─────────────────
  build-pages:
    name: Build (GitHub Pages)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5
        id: pages

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build (Pages target)
        run: npm run build
        env:
          DOCUSAURUS_BASE_URL: ${{ steps.pages.outputs.base_path }}/
          SITE_URL: ${{ steps.pages.outputs.origin }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy-pages:
    name: Deploy → GitHub Pages
    runs-on: ubuntu-latest
    needs: build-pages
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4

  # ── AWS S3 + CloudFront ─────────────────────────────────────────────────────
  deploy-aws:
    name: Deploy → AWS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://${{ secrets.AWS_CF_DISTRIBUTION_ID }}.cloudfront.net
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-aws
          path: build/

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync hashed assets (immutable cache)
        run: |
          aws s3 sync build/ s3://${{ secrets.AWS_S3_BUCKET }}/ \
            --delete \
            --exclude "*.html" --exclude "sitemap*" --exclude "*.xml" \
            --cache-control "max-age=31536000,public,immutable"

      - name: Sync HTML (no-cache)
        run: |
          aws s3 sync build/ s3://${{ secrets.AWS_S3_BUCKET }}/ \
            --exclude "*" \
            --include "*.html" --include "sitemap*" --include "*.xml" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CF_DISTRIBUTION_ID }} \
            --paths "/*"

  # ── Docker → ECR ─────────────────────────────────────────────────────────────
  docker-push:
    name: Push → ECR
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build \
            --build-arg DOCUSAURUS_BASE_URL=/ \
            --cache-from $REGISTRY/${{ env.ECR_REPO }}:latest \
            -t $REGISTRY/${{ env.ECR_REPO }}:${{ github.sha }} \
            -t $REGISTRY/${{ env.ECR_REPO }}:latest \
            .
          docker push $REGISTRY/${{ env.ECR_REPO }}:${{ github.sha }}
          docker push $REGISTRY/${{ env.ECR_REPO }}:latest
